services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.example
    volumes:
      - ./app:/app/app
      - ./context-hub:/app/context-hub
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=INFO
    env_file:
      - .env.example
    volumes:
      - ./app:/app/app
      - ./context-hub:/app/context-hub
    depends_on:
      - postgres
      - redis

  beat:
    build: .
    command: celery -A app.worker.celery_app beat --loglevel=INFO
    env_file:
      - .env.example
    volumes:
      - ./app:/app/app
      - ./context-hub:/app/context-hub
    depends_on:
      - postgres
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aios
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: aios
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

